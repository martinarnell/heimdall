[package]
name = "heimdall-compare"
version.workspace = true
edition.workspace = true

[[bin]]
name = "heimdall-compare"
path = "src/main.rs"

[dependencies]
heimdall-core = { path = "../heimdall-core" }
heimdall-normalize = { path = "../heimdall-normalize" }
