"ل" = "l"
"م" = "m"
"ن" = "n"
"ه" = "h"
"و" = "w"
"ي" = "y"

# Hamza variants -> "a" (simplified)
"أ" = "a"
"إ" = "a"
"آ" = "a"

# Ta marbuta, alef maqsura -> "a"
"ة" = "a"
"ى" = "a"

# Hamza carriers -> strip (hamza on waw, hamza on ya)
"ؤ" = ""
"ئ" = ""
