[diacritics]
# Arabic definite article (multi-char, matched first due to longest-first sorting)
"ال" = "al"

# 28 Arabic base consonants -> Latin transliteration
# Tashkeel (fatha, damma, kasra, shadda, sukun, tanwin) is stripped automatically
# by strip_combining_marks = true BEFORE these mappings run.
