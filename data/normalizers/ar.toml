# Arabic place name normalizer
# Shared by Arabic-speaking countries: SA, AE, QA, KW, BH, OM, YE, IQ, SY, JO, LB, PS, EG, LY, TN, DZ, MA.
# Photon data is primarily Latin-script, but Arabic script names appear in name:ar tags.
# No phonetic encoding — Arabic has no suitable European phonetic scheme,
# and a dedicated Arabic one (e.g., Soundex-AR) is not yet implemented.
#
# Pipeline: strip_combining_marks removes tashkeel (fatha, damma, kasra, shadda, sukun,
# tanwin) via NFD decomposition BEFORE [diacritics] transliteration runs.
# Then [diacritics] maps Arabic base letters to Latin equivalents (longest-first).

[phonetic]
engine = "none"
strip_combining_marks = true  # strips tashkeel before transliteration

[abbreviations]
# Arabic street types (Arabic script -> abbreviated)
"شارع" = "ش"
"طريق" = "ط"
"ميدان" = "م"
"حارة" = "ح"
"زقاق" = "ز"
"جادة" = "ج"

# Latin-script transliterations of Arabic street types
"sharia" = "sh"
"shari" = "sh"
"tariq" = "t"
"midan" = "m"
"hara" = "h"

# Common Arabic address prefixes
"حي" = "حي"
"منطقة" = "منطقة"

