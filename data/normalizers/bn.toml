# Bengali place name normalizer
# Bangladesh (BD).
# Bengali script with Latin transliterations in Photon data.
# No phonetic encoding — Bengali syllabic structure needs a dedicated scheme (not implemented).

[phonetic]
engine = "none"

[abbreviations]
# Bengali street types
"সড়ক" = "সড়ক"
"রোড" = "রোড"
"গলি" = "গলি"
"লেন" = "লেন"

# English street types common in Bangladeshi addresses
"road" = "rd"
"street" = "st"
"lane" = "ln"
"sarak" = "srk"

[stopwords]
words = [
    "বাংলাদেশ",
    "bangladesh",
    "bd",
    "people's republic of bangladesh",
    "গণপ্রজাতন্ত্রী বাংলাদেশ",
]

[known_variants]
# Major Bangladeshi cities — English → Bengali
"dhaka" = "ঢাকা"
"dacca" = "ঢাকা"
"chittagong" = "চট্টগ্রাম"
"chattogram" = "চট্টগ্রাম"
"khulna" = "খুলনা"
"rajshahi" = "রাজশাহী"
"sylhet" = "সিলেট"
"comilla" = "কুমিল্লা"
"cumilla" = "কুমিল্লা"
"rangpur" = "রংপুর"
"barisal" = "বরিশাল"
"barishal" = "বরিশাল"
"mymensingh" = "ময়মনসিংহ"
"gazipur" = "গাজীপুর"
"narayanganj" = "নারায়ণগঞ্জ"
"tongi" = "টঙ্গী"
"bogra" = "বগুড়া"
"bogura" = "বগুড়া"
