# Danish place name normalizer
# Covers Danish, common English/ASCII approximations, and admin stopwords.
# Greenland (kl) and Faroe Islands (fo) are separate Geofabrik extracts —
# their place names belong in their own normalizer files, not here.

[abbreviations]
# Danish street types. Only real, widely-used short forms — no identity
# no-ops. Don't list "gade" = "gade".
"v." = "vej"
"vj." = "vej"
"g." = "gade"
"gd." = "gade"
"pl." = "plads"
"st." = "stræde"
"str." = "stræde"
"bv." = "boulevard"
"blvd." = "boulevard"

# Directional (Danish: nordre/søndre/østre/vestre)
"n." = "nordre"
"s." = "søndre"
"ø." = "østre"
"vestr." = "vestre"
"ndr." = "nordre"
"sdr." = "søndre"
"østr." = "østre"
"vstr." = "vestre"

# Size
"l." = "lille"
"ll." = "lille"

# City code (KBH = København) — widely used in addresses, news, signage.
"kbh" = "københavn"
"kbh." = "københavn"

[stopwords]
# Country / admin / region words callers tack on but that aren't part
# of the canonical OSM/DAR name.
words = [
    "kommune",
    "region",
    "regionen",
    "amt",          # historical pre-2007 administrative unit
    "by",           # "Aarhus by" → "Aarhus"
    "sogn",         # parish — common in rural place lists
    "denmark",
    "danmark",
    "dk",
]

# Lossy ASCII fallbacks for Danish atomic letters. `å` decomposes under
# NFD (a + combining ring) and is handled automatically by the universal
# ASCII stripper, so it's NOT listed here. `æ` and `ø` are atomic
# codepoints with no decomposition; declare them explicitly.
#
# Formal transliterations (æ→ae, ø→oe) are handled per-place in
# `known_variants` — only for cities where the formal form is in active
# use (passports, postcards, English copy).
[diacritics]
"æ" = "a"
"ø" = "o"

# Danish definite-article suffixes. Same family as Norwegian/Swedish.
# Singular: -en (common, "kirken"), -et (neuter, "huset"), bare -n on
# vowel-final stems ("kirke" → "kirken"). Plural definite: -ene
# ("husene"), -erne ("kirkerne", "gaderne") — Danish-specific.
# Order longest-first; engine only fires when stripped stem stays ≥ 4 chars.
[definite_suffixes]
suffixes = ["erne", "ene", "et", "en", "n"]

[known_variants]
# English exonyms — names English speakers actually type.
"copenhagen" = "københavn"
"copenhague" = "københavn"
"elsinore" = "helsingør"
"jutland" = "jylland"
"zealand" = "sjælland"
"funen" = "fyn"

# Formal æ→ae / ø→oe transliterations for cities where the formal form
# shows up in passports, postcards, and English tourism copy. Lossy
# (æ→a, ø→o) is auto-generated by [diacritics] above.
"koebenhavn" = "københavn"
"helsingoer" = "helsingør"
"naerum" = "nærum"
"vaerloese" = "værløse"
"hoeje-taastrup" = "høje-taastrup"
"hoeje taastrup" = "høje-taastrup"
"aeroeskobing" = "ærøskøbing"
"aeroe" = "ærø"
"laesoe" = "læsø"
"samsoe" = "samsø"

# Aarhus / Århus: city restored "Aarhus" as its official spelling in
# 2011. OSM and DAR use "Aarhus". The Århus form still appears widely.
"århus" = "aarhus"

# Historical / Latin name still used in scientific Latin and older texts.
"hafnia" = "københavn"

# English landmark exonyms — names tourists actually use, distinct from
# the Danish forms.
"the little mermaid" = "den lille havfrue"
"the marble church" = "marmorkirken"
"the round tower" = "rundetårn"
"the sound" = "øresund"
"the limfjord" = "limfjorden"
