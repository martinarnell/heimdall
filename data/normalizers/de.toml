# German place-name normalizer
# Covers German diacritics (ä→ae, ö→oe, ü→ue), ß/ss equivalence,
# street suffixes, English/French/Italian/Polish/Czech exonyms for German
# cities, federal-state English variants, historical names, abbreviations.

[phonetic]
engine = "cologne"  # Kölner Phonetik — purpose-built for German

[abbreviations]
# Religious / honorary
"st." = "sankt"
"st" = "sankt"
"str." = "straße"
"str" = "straße"
"strasse" = "straße"

# Streets — common detached forms
"gasse" = "gasse"
"weg" = "weg"
"allee" = "allee"
"alle" = "allee"
"platz" = "platz"
"pl." = "platz"
"ring" = "ring"
"damm" = "damm"
"ufer" = "ufer"
"chaussee" = "chaussee"
"promenade" = "promenade"
"brücke" = "brücke"
"steig" = "steig"
"stieg" = "stieg"
"graben" = "graben"
"markt" = "markt"

# Directional
"n." = "nord"
"s." = "süd"
"o." = "ost"
"w." = "west"
"nw." = "nordwest"
"sw." = "südwest"
"no." = "nordost"
"so." = "südost"

# Administrative short forms
"hbf" = "hauptbahnhof"
"hbf." = "hauptbahnhof"
"bf." = "bahnhof"
"bhf." = "bahnhof"
"bf" = "bahnhof"
"bhf" = "bahnhof"

# Titles common in street names
"dr." = "doktor"
"prof." = "professor"

[stopwords]
words = [
    "stadt",
    "gemeinde",
    "landkreis",
    "kreis",
    "regierungsbezirk",
    "bezirk",
    "germany",
    "deutschland",
    "bundesrepublik",
    "bundesland",
    "freistaat",
    "hansestadt",
    "universitätsstadt",
    "hansestadt",
    "stadtteil",
]

[diacritics]
# German umlauts → standard ASCII expansions (NOT single-char like Nordic).
# "ue", "oe", "ae" are the canonical German ASCII expansions; users
# typing them MUST resolve to the umlaut form too.
"ä" = "ae"
"ö" = "oe"
"ü" = "ue"
# ß handled via char_equivalences

[char_equivalences]
# ß ↔ ss bidirectional
"ß" = "ss"

# Suffix expansions: applied within compound tokens at the end.
# German compound place names ("Friedrichstr.", "Marienpl.") need the
# trailing abbreviation expanded even though the leading token
# ("Friedrich", "Marien") is the actual differentiator. Different from
# [abbreviations] which only matches standalone tokens.
[suffix_abbreviations]
"str." = "straße"
"str" = "straße"
"strasse" = "straße"
"pl." = "platz"
"platz" = "platz"
"-str." = "straße"
"-str" = "straße"
"hbf" = "hauptbahnhof"
"hbf." = "hauptbahnhof"
"bhf." = "bahnhof"
"bhf" = "bahnhof"
"bf." = "bahnhof"

