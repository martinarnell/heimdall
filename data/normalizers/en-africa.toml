# English place name normalizer for Sub-Saharan Africa
# Covers: BW (Botswana), GH (Ghana), GM (Gambia), KE (Kenya), LR (Liberia),
#         LS (Lesotho), MW (Malawi), MU (Mauritius), NA (Namibia), NG (Nigeria),
#         RW (Rwanda), SC (Seychelles), SL (Sierra Leone), SZ (Eswatini),
#         TZ (Tanzania), UG (Uganda), ZA (South Africa), ZM (Zambia), ZW (Zimbabwe)
# Standard English street abbreviations + known variants for major African cities.
# No phonetic encoding.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (normalize long -> short canonical form)
"street" = "st"
"avenue" = "ave"
"road" = "rd"
"drive" = "dr"
"boulevard" = "blvd"
"lane" = "ln"
"court" = "ct"
"place" = "pl"
"crescent" = "cres"
"close" = "cl"
"terrace" = "tce"
"highway" = "hwy"
"way" = "way"
"circle" = "cir"
"square" = "sq"
# Also handle abbreviated input -> canonical short
"st." = "st"
"ave." = "ave"
"rd." = "rd"
"dr." = "dr"
"blvd." = "blvd"
"ln." = "ln"
"ct." = "ct"
"pl." = "pl"
"cres." = "cres"
"cl." = "cl"
"hwy." = "hwy"

# Directional abbreviations
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"n." = "n"
"s." = "s"
"e." = "e"
"w." = "w"

# Common abbreviations
"mount" = "mt"
"saint" = "st"
"mt." = "mt"

[stopwords]
words = [
    "republic",
    "republic of",
    "kingdom",
    "kingdom of",
    "state",
    "state of",
    "district",
    "province",
    "region",
    "county",
    "ward",
    "municipality",
]

