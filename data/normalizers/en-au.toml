# Australian English place name normalizer
# Street type abbreviations, state abbreviations, directionals.
# No phonetic encoding — English doesn't benefit from Nordic/German phonetic schemes.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (normalize long → short canonical form)
"street" = "st"
"avenue" = "ave"
"road" = "rd"
"drive" = "dr"
"court" = "ct"
"crescent" = "cres"
"place" = "pl"
"lane" = "ln"
"close" = "cl"
"terrace" = "tce"
"parade" = "pde"
"highway" = "hwy"
"boulevard" = "blvd"
"circuit" = "cct"
"way" = "way"
"grove" = "gr"
"gardens" = "gdns"
"square" = "sq"
"rise" = "rise"
"trail" = "trl"
# Also handle abbreviated input → canonical short
"st." = "st"
"ave." = "ave"
"rd." = "rd"
"dr." = "dr"
"ct." = "ct"
"cres." = "cres"
"pl." = "pl"
"ln." = "ln"
"cl." = "cl"
"tce." = "tce"
"pde." = "pde"
"hwy." = "hwy"
"blvd." = "blvd"

# Directional abbreviations
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"n." = "n"
"s." = "s"
"e." = "e"
"w." = "w"

# Common Australian abbreviations
"mount" = "mt"
"saint" = "st"
"mt." = "mt"

[stopwords]
words = [
    "australia",
    "au",
]

[known_variants]
# City nicknames
"melb" = "melbourne"
"syd" = "sydney"
"bris" = "brisbane"
"adl" = "adelaide"
"cbr" = "canberra"
# Common alternate names
"the gold coast" = "gold coast"
"ayers rock" = "uluru"
"alice" = "alice springs"

[diacritics]
# Australian English is ASCII — handle occasional accented imports
"é" = "e"
"è" = "e"
"ê" = "e"
"ë" = "e"
"á" = "a"
"à" = "a"
"â" = "a"
"ä" = "a"
"í" = "i"
"ì" = "i"
"î" = "i"
"ï" = "i"
"ó" = "o"
"ò" = "o"
"ô" = "o"
"ö" = "o"
"ú" = "u"
"ù" = "u"
"û" = "u"
"ü" = "u"
"ñ" = "n"
"ç" = "c"
