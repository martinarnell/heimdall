# English Caribbean place name normalizer
# Covers: JM (Jamaica), TT (Trinidad & Tobago), BB (Barbados), AG (Antigua & Barbuda),
#         BS (Bahamas), BM (Bermuda), DM (Dominica), GD (Grenada),
#         KN (Saint Kitts & Nevis), LC (Saint Lucia), VC (Saint Vincent & the Grenadines),
#         BZ (Belize), GY (Guyana)
# Photon-only countries. Standard English street abbreviations + Caribbean city variants.
# No phonetic encoding.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (normalize long → short canonical form)
"street" = "st"
"avenue" = "ave"
"road" = "rd"
"drive" = "dr"
"boulevard" = "blvd"
"lane" = "ln"
"court" = "ct"
"place" = "pl"
"crescent" = "cres"
"close" = "cl"
"terrace" = "tce"
"highway" = "hwy"
"way" = "way"
"circle" = "cir"
"square" = "sq"
"gardens" = "gdns"
# Also handle abbreviated input → canonical short
"st." = "st"
"ave." = "ave"
"rd." = "rd"
"dr." = "dr"
"blvd." = "blvd"
"ln." = "ln"
"ct." = "ct"
"pl." = "pl"
"cres." = "cres"
"cl." = "cl"
"hwy." = "hwy"

# Directional abbreviations
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"n." = "n"
"s." = "s"
"e." = "e"
"w." = "w"

# Common abbreviations
"mount" = "mt"
"saint" = "st"
"mt." = "mt"

[stopwords]
words = [
    "jamaica",
    "jm",
    "trinidad and tobago",
    "trinidad & tobago",
    "tt",
    "barbados",
    "bb",
    "antigua and barbuda",
    "antigua & barbuda",
    "ag",
    "bahamas",
    "the bahamas",
    "bs",
    "bermuda",
    "bm",
    "dominica",
    "dm",
    "grenada",
    "gd",
    "saint kitts and nevis",
    "st kitts and nevis",
    "st kitts & nevis",
    "kn",
    "saint lucia",
    "st lucia",
    "lc",
    "saint vincent and the grenadines",
    "st vincent",
    "vc",
    "belize",
    "bz",
    "guyana",
    "gy",
    "parish",
    "county",
    "district",
    "region",
]

