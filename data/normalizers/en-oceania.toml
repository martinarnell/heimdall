# Pacific Islands English place name normalizer
# Used for English-speaking Pacific Island nations: Fiji (FJ), Papua New Guinea (PG),
# Solomon Islands (SB), Vanuatu (VU), Samoa (WS), Tonga (TO), Cook Islands (CK),
# Micronesia (FM), Kiribati (KI), Marshall Islands (MH), N. Mariana Islands (MP),
# Nauru (NR), Niue (NU), Palau (PW), Tuvalu (TV).
# Basic English normalizer with Pacific-specific city variants and Polynesian macrons.
# No phonetic encoding — English with simple orthography.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (English — common across Pacific)
"street" = "st"
"avenue" = "ave"
"road" = "rd"
"drive" = "dr"
"lane" = "ln"
"highway" = "hwy"
"boulevard" = "blvd"
"crescent" = "cres"
"place" = "pl"
"close" = "cl"
"st." = "st"
"ave." = "ave"
"rd." = "rd"
"dr." = "dr"
"ln." = "ln"
"hwy." = "hwy"
"blvd." = "blvd"

# Directional abbreviations
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"n." = "n"
"s." = "s"
"e." = "e"
"w." = "w"

# Common abbreviations
"mount" = "mt"
"saint" = "st"
"mt." = "mt"

[stopwords]
words = [
    "fiji",
    "fj",
    "papua new guinea",
    "png",
    "pg",
    "solomon islands",
    "sb",
    "vanuatu",
    "vu",
    "samoa",
    "ws",
    "tonga",
    "to",
    "cook islands",
    "ck",
    "micronesia",
    "federated states of micronesia",
    "fm",
    "kiribati",
    "ki",
    "marshall islands",
    "mh",
    "northern mariana islands",
    "mp",
    "nauru",
    "nr",
    "niue",
    "nu",
    "palau",
    "pw",
    "tuvalu",
    "tv",
]

