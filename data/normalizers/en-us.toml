# ---------------------------------------------------------------------------
# Diacritics — normalise to ASCII equivalents so users can search
# Spanish-origin / Hawaiian / Native American place names without typing
# the marked letters.
# ---------------------------------------------------------------------------
[diacritics]
# Romance-language vowels
"é" = "e"
"è" = "e"
"ê" = "e"
"ë" = "e"
"á" = "a"
"à" = "a"
"â" = "a"
"ä" = "a"
"ã" = "a"
"å" = "a"
"í" = "i"
"ì" = "i"
"î" = "i"
"ï" = "i"
"ó" = "o"
"ò" = "o"
"ô" = "o"
"ö" = "o"
"õ" = "o"
"ú" = "u"
"ù" = "u"
"û" = "u"
"ü" = "u"
"ñ" = "n"
"ç" = "c"
"ý" = "y"
"ÿ" = "y"
"æ" = "ae"
"œ" = "oe"
"ø" = "o"
# Hawaiian — kahakō (macron-marked vowels)
"ā" = "a"
"ē" = "e"
"ī" = "i"
"ō" = "o"
"ū" = "u"
"Ā" = "a"
"Ē" = "e"
"Ī" = "i"
"Ō" = "o"
"Ū" = "u"
# Hawaiian ʻokina (glottal stop) and visually-similar punctuation — strip
# entirely so "Hawaiʻi" matches "Hawaii", "Oʻahu" matches "Oahu",
# "Kauaʻi" matches "Kauai". `[diacritics]` is one-way replacement, so
# the empty target safely drops the codepoint without spawning bogus
# bidirectional candidates.
"ʻ" = ""
"ʼ" = ""

# ---------------------------------------------------------------------------
# Character equivalences — non-letter characters that should normalize
# but aren't pure diacritics. (Reserved; nothing US-specific yet.)
# ---------------------------------------------------------------------------
[char_equivalences]
