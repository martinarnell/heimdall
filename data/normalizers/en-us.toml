# US English place name normalizer.
#
# Covers USPS Pub 28 street-type abbreviations (the canonical mapping the
# Postal Service uses to standardise addresses), directionals (cardinal +
# ordinal), state names ↔ abbreviations, ordinal numbers (1st/first), and
# a long-tail of city nicknames + historical names.
#
# No phonetic encoding — US English doesn't benefit from the Nordic /
# German phonetic schemes. ASCII normalization handles diacritics in
# Spanish/Hawaiian-origin names (San José, Hawaiʻi, etc.).

[phonetic]
engine = "none"

# ---------------------------------------------------------------------------
# Abbreviations — long form → canonical short form
# ---------------------------------------------------------------------------
# USPS street-type table (Pub 28). The user types either form and the
# normalizer collapses to the short form so the FST sees a single
# canonical key.
[abbreviations]
# Core street types
"street" = "st"
"avenue" = "ave"
"boulevard" = "blvd"
"drive" = "dr"
"road" = "rd"
"lane" = "ln"
"court" = "ct"
"place" = "pl"
"parkway" = "pkwy"
"highway" = "hwy"
"circle" = "cir"
"terrace" = "ter"
"trail" = "trl"
"expressway" = "expy"
"freeway" = "fwy"
"alley" = "aly"
"way" = "way"
"square" = "sq"
"plaza" = "plz"
"crossing" = "xing"
"crescent" = "cres"
"loop" = "loop"
"path" = "path"
"pike" = "pike"
"bridge" = "brg"
"tunnel" = "tunl"
"viaduct" = "vis"
"junction" = "jct"
"bypass" = "byp"
"extension" = "ext"
"gateway" = "gtwy"
"harbor" = "hbr"
"harbour" = "hbr"
"heights" = "hts"
"hollow" = "holw"
"island" = "is"
"key" = "ky"
"landing" = "lndg"
"manor" = "mnr"
"meadows" = "mdws"
"mews" = "mews"
"pass" = "pass"
"point" = "pt"
"port" = "prt"
"ranch" = "rnch"
"ridge" = "rdg"
"river" = "riv"
"run" = "run"
"shore" = "shr"
"spur" = "spur"
"summit" = "smt"
"turnpike" = "tpke"
"view" = "vw"
"valley" = "vly"
"village" = "vlg"
"vista" = "vis"
"oval" = "oval"
"row" = "row"

# Dot-suffix variants (canonical-collapse to short form)
"st." = "st"
"ave." = "ave"
"blvd." = "blvd"
"dr." = "dr"
"rd." = "rd"
"ln." = "ln"
"ct." = "ct"
"pl." = "pl"
"pkwy." = "pkwy"
"hwy." = "hwy"
"cir." = "cir"
"ter." = "ter"
"trl." = "trl"
"sq." = "sq"
"plz." = "plz"
"jct." = "jct"
"hts." = "hts"
"pt." = "pt"
"vlg." = "vlg"

# Directionals (long → short)
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"northeast" = "ne"
"northwest" = "nw"
"southeast" = "se"
"southwest" = "sw"
"n." = "n"
"s." = "s"
"e." = "e"
"w." = "w"
"ne." = "ne"
"nw." = "nw"
"se." = "se"
"sw." = "sw"

# US-specific contractions
"mount" = "mt"
"fort" = "ft"
"saint" = "st"
"sainte" = "ste"
"mt." = "mt"
"ft." = "ft"
"ste." = "ste"
"rev." = "rev"
"dr" = "dr"     # title; same canonical as drive (both 'dr')

# Common ordinals — both word and digit forms collapse to digit form so
# "1st Ave" and "First Ave" hit the same FST key.
"first" = "1st"
"second" = "2nd"
"third" = "3rd"
"fourth" = "4th"
"fifth" = "5th"
"sixth" = "6th"
"seventh" = "7th"
"eighth" = "8th"
"ninth" = "9th"
"tenth" = "10th"
"eleventh" = "11th"
"twelfth" = "12th"
"thirteenth" = "13th"
"fourteenth" = "14th"
"fifteenth" = "15th"
"sixteenth" = "16th"
"seventeenth" = "17th"
"eighteenth" = "18th"
"nineteenth" = "19th"
"twentieth" = "20th"

# State name expansion intentionally NOT in [abbreviations]: that section
# rewrites every matching token wherever it appears, which would munge
# street names like "Pennsylvania Avenue" → "PA Avenue" or "Texas
# Highway" → "TX Highway". The API layer's `strip_us_state_suffix` /
# `match_us_state` handles state names *only* in the trailing-suffix
# position, which is the only place they're unambiguous.

# ---------------------------------------------------------------------------
# Stopwords — words to drop from the candidate stream so they don't
# pollute the FST lookup as a separate token.
# ---------------------------------------------------------------------------
[stopwords]
words = [
    "united states",
    "united states of america",
    "usa",
    "u.s.a.",
    "u.s.",
    "us",
    "america",
    "the",
    "city of",
    "county of",
    "borough of",
    "township of",
    "village of",
    "town of",
    "state of",
    "commonwealth of",
]

