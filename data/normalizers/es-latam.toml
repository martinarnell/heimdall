# Latin American Spanish place name normalizer
# Covers: MX (Mexico), AR (Argentina), CL (Chile), CO (Colombia), PE (Peru),
#         VE (Venezuela), EC (Ecuador), BO (Bolivia), PY (Paraguay), UY (Uruguay),
#         CR (Costa Rica), PA (Panama), GT (Guatemala), HN (Honduras),
#         SV (El Salvador), NI (Nicaragua), CU (Cuba), DO (Dominican Republic)
# Photon-only countries. Street type abbreviations, diacritics, city variants.
# No phonetic encoding — Spanish spelling is regular enough for exact + Levenshtein.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (normalize long → short canonical form)
"calle" = "c"
"c/" = "c"
"c." = "c"
"cl." = "c"
"avenida" = "av"
"av." = "av"
"avda." = "av"
"avda" = "av"
"carrera" = "cra"
"cra." = "cra"
"boulevard" = "blvd"
"blvd." = "blvd"
"paseo" = "pso"
"pso." = "pso"
"callejón" = "cjn"
"cjn." = "cjn"
"autopista" = "aut"
"aut." = "aut"
"camino" = "cno"
"cno." = "cno"
"carretera" = "ctra"
"ctra." = "ctra"
"diagonal" = "diag"
"diag." = "diag"
"plaza" = "pza"
"pza." = "pza"
"pl." = "pza"
"ronda" = "rda"
"rda." = "rda"
"transversal" = "trv"
"trv." = "trv"
"urbanización" = "urb"
"urb." = "urb"
"prolongación" = "prol"
"prol." = "prol"
"circunvalación" = "circunv"
"glorieta" = "gta"
"gta." = "gta"
"pasaje" = "pje"
"pje." = "pje"
"jirón" = "jr"
"jr." = "jr"

# Religious/honorific
"santo" = "sto"
"santa" = "sta"
"san" = "s"
"general" = "gral"
"gral." = "gral"
"coronel" = "cnel"
"cnel." = "cnel"
"presidente" = "pte"
"pte." = "pte"
"doctor" = "dr"
"dr." = "dr"
"profesor" = "prof"
"prof." = "prof"

[stopwords]
words = [
    "mexico",
    "méxico",
    "mx",
    "argentina",
    "ar",
    "chile",
    "cl",
    "colombia",
    "co",
    "peru",
    "perú",
    "pe",
    "venezuela",
    "ve",
    "ecuador",
    "ec",
    "bolivia",
    "bo",
    "paraguay",
    "py",
    "uruguay",
    "uy",
    "costa rica",
    "cr",
    "panama",
    "panamá",
    "pa",
    "guatemala",
    "gt",
    "honduras",
    "hn",
    "el salvador",
    "sv",
    "nicaragua",
    "ni",
    "cuba",
    "cu",
    "república dominicana",
    "dominican republic",
    "do",
    "república",
    "estado",
    "departamento",
    "provincia",
    "municipio",
    "cantón",
    "distrito",
    "región",
    "parroquia",
]

[diacritics]
# Spanish accented characters → ASCII equivalents
"ñ" = "n"
"á" = "a"
"é" = "e"
"í" = "i"
"ó" = "o"
"ú" = "u"
"ü" = "u"

