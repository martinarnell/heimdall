# Persian/Farsi place name normalizer
# Iran (IR), partly Afghanistan (AF).
# Arabic script base with four additional Persian letters: پ چ ژ گ.
# No phonetic encoding — no suitable scheme implemented.

[phonetic]
engine = "none"

[abbreviations]
# Persian street types
"خیابان" = "خ"
"کوچه" = "ک"
"بلوار" = "بل"
"بزرگراه" = "بزر"
"میدان" = "م"
"جاده" = "ج"

# Latin-script transliterations
"khiaban" = "kh"
"kheyaban" = "kh"
"kuche" = "k"
"kucheh" = "k"
"bulvar" = "bl"
"boulevard" = "bl"
"meydan" = "m"
"meidan" = "m"

[stopwords]
words = [
    "ایران",
    "iran",
    "ir",
    "جمهوری اسلامی ایران",
    "islamic republic of iran",
    "افغانستان",
    "afghanistan",
    "af",
]

[known_variants]
