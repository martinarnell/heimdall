[diacritics]
# Persian-specific letters (not in Arabic) → Latin
"پ" = "p"
"چ" = "ch"
"ژ" = "zh"
"گ" = "g"

# Shared Arabic letters → Latin (same as ar.toml)
"ا" = "a"
"أ" = "a"
"إ" = "i"
"آ" = "a"
"ب" = "b"
"ت" = "t"
"ث" = "s"
