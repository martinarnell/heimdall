# Finnish place name normalizer
# Covers Finnish, Swedish (bilingual exonyms), Sami names, and the
# language's defining feature: ~15 grammatical case suffixes that get
# attached to place names ("Helsingissä" = "in Helsinki").
#
# No [diacritics] section: Finnish ä/ö are full letters (not umlauts of
# a/o), but for fuzzy ASCII fallback the Nordic default (ä→a, ö→o) is
# what we want and is applied automatically by lib.rs Step 7 when this
# section is absent. Adding [diacritics] would override that fallback.
#
# No [definite_suffixes]: Finnish has no definite article. Definiteness
# is expressed through case + word order. The case_suffixes block does
# the morphological work instead.

[abbreviations]
# Finnish street types — only real, widely-used short forms.
# No identity no-ops ("katu" = "katu") — those are noise.
"k."   = "katu"      # katu = street
"t."   = "tie"       # tie  = road
"kj."  = "kuja"      # kuja = lane / alley
"p."   = "polku"     # polku = path
"pst." = "puistikko" # puistikko = little park / promenade
"r."   = "raitti"    # raitti = village street / lane

# Directional modifiers (common in compound place names)
"pohj." = "pohjoinen" # north
"et."   = "etelä"     # south
"it."   = "itä"       # east
"länt." = "länsi"     # west

[stopwords]
# Country / admin words callers tack on. Stripped at query time.
words = [
    "kunta",       # municipality
    "kaupunki",    # city
    "maakunta",    # region
    "lääni",       # historical province (pre-2010)
    "kommun",      # Swedish equivalent (bilingual municipalities)
    "stad",        # Swedish "city"
    "finland",
    "suomi",
    "fi",
]

[known_variants]
# ── Finnish ↔ Swedish bilingual city pairs ──────────────────────────
# Finland is officially bilingual. Swedish names dominate in
# coastal/Åland regions and appear on signage and in Swedish-language
# media. OSM canonical is Finnish, so we map Swedish → Finnish.
"helsingfors"  = "helsinki"
"esbo"         = "espoo"
"vanda"        = "vantaa"
"åbo"          = "turku"
"abo"          = "turku"
"tammerfors"   = "tampere"
"vasa"         = "vaasa"
"uleåborg"     = "oulu"
"uleaborg"     = "oulu"
"björneborg"   = "pori"
"bjorneborg"   = "pori"
"tavastehus"   = "hämeenlinna"
"karleby"      = "kokkola"
"jakobstad"    = "pietarsaari"
"nyslott"      = "savonlinna"
"nystad"       = "uusikaupunki"
"nykarleby"    = "uusikaarlepyy"
"kristinestad" = "kristiinankaupunki"
"borgå"        = "porvoo"
"borga"        = "porvoo"
"ekenäs"       = "tammisaari"
"ekenas"       = "tammisaari"
"hangö"        = "hanko"
"hango"        = "hanko"
"lovisa"       = "loviisa"
"karis"        = "karjaa"
"sibbo"        = "sipoo"
"raseborg"     = "raasepori"

# ── Åland (autonomous, Swedish-speaking — OSM uses Swedish here) ────
# Map Finnish → Swedish (opposite of mainland) so Finnish-speaking
# users still find the place.
"maarianhamina" = "mariehamn"
"ahvenanmaa"    = "åland"

# ── English exonyms ────────────────────────────────────────────────
"lapland"        = "lappi"
"karelia"        = "karjala"
"finland proper" = "varsinais-suomi"

# ── Landmark exonyms (Swedish historical names + English aliases) ───
# Suomenlinna's original 18th-century Swedish name is Sveaborg —
# both still appear in tourism copy, signage, Finlandization-era texts.
"sveaborg"          = "suomenlinna"
"st. olaf's castle" = "olavinlinna"
"st olafs castle"   = "olavinlinna"
"olofsborg"         = "olavinlinna"   # Swedish historical name

# ── Sami exonyms (Northern Sami is a recognised minority language) ──
"anár"        = "inari"
"aanaar"      = "inari"
"ohcejohka"   = "utsjoki"
"eanodat"     = "enontekiö"
"avvil"       = "ivalo"

[case_suffixes]
# Finnish grammatical cases. Place names are routinely inflected:
#   "Helsingissä" (in)        "Helsinkiin" (to)
#   "Tampereella" (at)        "Tampereelta" (from)
#   "Turkuun" (to)            "Turusta" (from)
#
# strip_case_suffix() fires only on single-word queries and only when
# the stripped stem is ≥ 3 chars. Suffixes are sorted longest-first by
# the loader so "ssä" matches before "n".
#
# We deliberately do NOT include known city stems ("helsingissä"
# → "helsinki") in known_variants — that was hand-written redundancy.
# The case stripper produces "helsing" which the FST + Lev-1 + phonetic
# layers resolve to "helsinki".
suffixes = [
    # Locative cases (most common in place-name queries)
    "ssä", "ssa",       # inessive: "in X" — Helsingissä, Turussa
    "stä", "sta",       # elative:  "from X" — Helsingistä, Turusta
    "seen",             # illative (vowel-final stems): Espooseen
    "ään", "aan",       # illative (long-vowel form): Helsinkiin
    "lle",              # allative: "to X" — Tampereelle
    "ltä", "lta",       # ablative: "from X" — Tampereelta
    "llä", "lla",       # adessive: "at X" — Tampereella

    # Illative variants for short / consonant stems
    "iin", "hin", "hen", "hun", "hön",

    # Genitive plural / partitive plural
    "jen", "ien", "den",

    # Genitive / accusative singular
    "in", "un", "yn", "on", "ön", "en", "än",
    "n",                # bare genitive: ordered last so longer matches win
]
