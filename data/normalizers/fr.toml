# Mont Blanc — the actual mountain (highest peak in W. Europe) is in OSM
# under "Mont Blanc / Monte Bianco" (FR/IT bilingual). A small Gascon
# village "Monblanc" (no 't') has alt_name=Mont Blanc which puts it on
# the same exact-key as the mountain via the alt-name index pass; the
# village's FST entry is at full importance while the mountain's slash-
# split entry is /128-demoted. Without redirecting "mont blanc" to the
# canonical bilingual form first, the lookup lands on the Gascon
# Monblanc instead of the mountain.
"mont blanc" = "mont blanc / monte bianco"
"montblanc" = "mont blanc / monte bianco"
"chamonix mont blanc" = "chamonix-mont-blanc"
