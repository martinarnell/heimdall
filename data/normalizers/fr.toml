# French place-name normalizer
# Covers French diacritics (é→e, à→a, etc.), street suffixes,
# English/German/Italian/Spanish/Dutch exonyms for major French cities,
# régional English variants, historical names, abbreviations.
# Phonetic engine disabled — French street/town vocabulary is fixed
# enough that exact + Levenshtein covers fuzziness; the phonetic
# encoders we ship are tuned for Germanic/Slavic phonology and would
# mangle "Saint-Étienne" type inputs.

[phonetic]
engine = "none"

[abbreviations]
# Religious / honorific (standalone tokens only)
"st" = "saint"
"st." = "saint"
"ste" = "sainte"
"ste." = "sainte"
"sts" = "saints"
"mt" = "mont"
"mt." = "mont"

# Street type abbreviations — keep canonical forms long, expand short
# to long. The address pipeline normalises both sides so either spelling
# works, but we keep the canonical the OSM-typical full form.
"r." = "rue"
"av" = "avenue"
"av." = "avenue"
"ave" = "avenue"
"ave." = "avenue"
"bd" = "boulevard"
"bd." = "boulevard"
"blv" = "boulevard"
"blv." = "boulevard"
"blvd" = "boulevard"
"blvd." = "boulevard"
"all" = "allée"
"all." = "allée"
"ch" = "chemin"
"ch." = "chemin"
"imp" = "impasse"
"imp." = "impasse"
"pl" = "place"
"pl." = "place"
"pa" = "passage"
"pas" = "passage"
"pass" = "passage"
"pass." = "passage"
"rte" = "route"
"rte." = "route"
"sq" = "square"
"sq." = "square"
"qu" = "quai"
"qu." = "quai"
"crs" = "cours"
"prom" = "promenade"
"prom." = "promenade"
"cite" = "cité"
"vil" = "villa"
"villa" = "villa"

# Stations / transport
"gare" = "gare"

# Cardinal directions
"n." = "nord"
"s." = "sud"
"e." = "est"
"o." = "ouest"

[stopwords]
# Generic admin / geographic words that add no signal
words = [
    "france",
    "fr",
    "république",
    "republique",
    "république française",
    "republique francaise",
    "métropolitaine",
    "metropolitaine",
    "région",
    "regions",
    "region",
    "département",
    "departement",
    "departments",
    "arrondissement",
    "arrondissements",
    "commune",
    "communes",
    "communauté",
    "communaute",
    "communauté de communes",
    "communaute de communes",
    "métropole",
    "metropole",
    "intercommunalité",
    "intercommunalite",
    "epci",
    "ville",
    "villes",
    "ville de",
    "préfecture",
    "prefecture",
    "sous-préfecture",
    "sous-prefecture",
    # Outre-mer / overseas markers
    "outre-mer",
    "outremer",
    "dom",
    "drom",
    "tom",
]

[diacritics]
# French accents → ASCII. Bidirectional via the per-word indexer:
# "Ile-de-France" / "Île-de-France" both resolve.
"é" = "e"
"è" = "e"
"ê" = "e"
"ë" = "e"
"à" = "a"
"â" = "a"
"ä" = "a"
"ç" = "c"
"î" = "i"
"ï" = "i"
"ô" = "o"
"ö" = "o"
"ù" = "u"
"û" = "u"
"ü" = "u"
"ÿ" = "y"
"œ" = "oe"
"æ" = "ae"
"ñ" = "n"

[char_equivalences]
# Apostrophe handling — French elision ("L'Authie", "Côte d'Azur").
# The address pipeline tokenises around apostrophes, so this only matters
# for the place-name FST. Both straight and curly forms map together.
"'" = "'"
"’" = "'"

# ── Suffix expansions for compound tokens ──────────────────────────────
# French rarely concatenates street suffixes the way German does
# ("Friedrichstr." → "Friedrichstraße") — French keeps them separate
# ("rue Lafayette", not "Lafayetterue"). So the suffix table is small,
# only covering numbered arrondissements and cardinal-direction
# compounds that show up in OSM.
[suffix_abbreviations]
"-st-" = "-saint-"
"-ste-" = "-sainte-"
"-mt-" = "-mont-"

