# Hindi/Devanagari place name normalizer
# Covers: IN (India), NP (Nepal)
#
# Strategy: Devanagari is an abugida — consonants carry an inherent vowel, modified
# by combining matras (vowel signs). With strip_combining_marks = true, matras
# (ा ि ी ु ू े ै ो ौ), virama (्), anusvara (ं), visarga (ः), and chandrabindu (ँ)
# are stripped, leaving only base consonants and independent vowels. The [diacritics]
# table then transliterates these base forms to Latin equivalents.
#
# Example: "मुंबई" → strip matras (ु, ं) → "मबई" → diacritics → "mbi"
# This is imperfect but sufficient for fuzzy matching. Exact Devanagari queries
# match the original script via the FST.

[phonetic]
engine = "none"
strip_combining_marks = true

[abbreviations]
# Hindi street types (Devanagari) — kept as-is for Devanagari query matching
"सड़क" = "सड़क"
"मार्ग" = "मार्ग"
"रोड" = "रोड"
"गली" = "गली"
"चौक" = "चौक"
"नगर" = "नगर"
"पथ" = "पथ"

# English street types common in Indian addresses
"road" = "rd"
"street" = "st"
"lane" = "ln"
"marg" = "marg"
"path" = "path"
"gali" = "gali"
"chowk" = "chowk"
"nagar" = "ngr"
"colony" = "col"
"sector" = "sec"
"block" = "blk"
"phase" = "ph"
"enclave" = "enc"
"extension" = "extn"
"vihar" = "vihar"
"puram" = "puram"
"bagh" = "bagh"

[stopwords]
words = [
    "भारत",
    "india",
    "republic of india",
    "भारत गणराज्य",
    "hindustan",
    "हिंदुस्तान",
    "नेपाल",
    "nepal",
]

