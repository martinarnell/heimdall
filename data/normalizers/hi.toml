[diacritics]
# Devanagari base consonants → Latin transliteration
# With strip_combining_marks = true, matras/virama/anusvara are stripped first,
# leaving only these base consonants and independent vowels for transliteration.

# Independent vowels
"अ" = "a"
"आ" = "a"
"इ" = "i"
"ई" = "i"
"उ" = "u"
"ऊ" = "u"
"ए" = "e"
"ऐ" = "ai"
"ओ" = "o"
"औ" = "au"
"ऋ" = "ri"

# Velar consonants
"क" = "k"
"ख" = "kh"
"ग" = "g"
"घ" = "gh"
"ङ" = "ng"

# Palatal consonants
"च" = "ch"
"छ" = "chh"
"ज" = "j"
"झ" = "jh"
"ञ" = "n"

# Retroflex consonants
"ट" = "t"
"ठ" = "th"
"ड" = "d"
"ढ" = "dh"
"ण" = "n"

# Dental consonants
"त" = "t"
"थ" = "th"
"द" = "d"
"ध" = "dh"
"न" = "n"

# Labial consonants
"प" = "p"
"फ" = "ph"
"ब" = "b"
"भ" = "bh"
"म" = "m"

# Semivowels and sibilants
"य" = "y"
"र" = "r"
"ल" = "l"
"व" = "v"
"श" = "sh"
"ष" = "sh"
"स" = "s"
"ह" = "h"

# Nukta characters (Perso-Arabic loanwords common in Indian place names)
# Note: with strip_combining_marks = true, the nukta (U+093C) is stripped,
# so ड़→ड (mapped as "d"), ज़→ज ("j"), etc. These entries are kept for
# correctness if strip_combining_marks is ever disabled.
"ड़" = "r"
"ढ़" = "rh"
"फ़" = "f"
"ज़" = "z"
"क़" = "q"
"ख़" = "kh"
"ग़" = "gh"
