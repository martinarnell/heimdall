# Korean place name normalizer
# Handles Hangul road-name addresses, romanized city names,
# and historical romanization variants (McCune-Reischauer → Revised).
# No phonetic encoding — Korean syllable blocks don't benefit from
# European phonetic schemes, and a Korean-specific one (e.g., chosung)
# is not yet implemented.

[phonetic]
engine = "none"

[abbreviations]
# Korean road type suffixes (Hangul) — keep as-is, they are part of the road name
"대로" = "대로"    # daero — boulevard / major road
"로" = "로"        # ro — road
"길" = "길"        # gil — street / lane

# Romanized road type suffixes
"daero" = "daero"
"ro" = "ro"
"gil" = "gil"

# Administrative suffixes — normalize long forms to short
"특별시" = "시"        # special city → city
"광역시" = "시"        # metropolitan city → city
"특별자치시" = "시"    # special autonomous city → city
"특별자치도" = "도"    # special autonomous province → province

[stopwords]
words = [
    "korea",
    "south korea",
    "republic of korea",
    "kr",
    "대한민국",
    "한국",
    "남한",
]

