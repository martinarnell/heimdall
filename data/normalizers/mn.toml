# Mongolian place name normalizer
# Used for Mongolia (MN). Mongolian uses Cyrillic script (same alphabet as Russian
# with two extra vowels: ө and ү). Romanization follows a mix of systems.
# Extends the Russian Cyrillic diacritics table with Mongolian-specific characters.
# No phonetic encoding — Cyrillic transliteration provides sufficient fuzzy matching.

[phonetic]
engine = "none"

[abbreviations]
# Mongolian administrative suffixes
"аймаг" = "аймаг"     # aimag — province
"сум" = "сум"          # sum — district
"хот" = "хот"          # khot — city
"дүүрэг" = "дүүрэг"   # duureg — urban district
"хороо" = "хороо"      # khoroo — sub-district
"гудамж" = "гуд"       # gudamj — street
"өргөн чөлөө" = "өч"  # orgon choloo — avenue/boulevard
"зам" = "зам"          # zam — road

# Romanized equivalents
"street" = "st"
"road" = "rd"
"avenue" = "ave"
"st." = "st"
"rd." = "rd"
"ave." = "ave"

[stopwords]
words = [
    "mongolia",
    "mn",
    "монгол",
    "монгол улс",
]

