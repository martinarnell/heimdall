"bayankhongor" = "баянхонгор"
"arvaikheer" = "арвайхээр"
"zuunmod" = "зуунмод"
"murun" = "мөрөн"
"bulgan" = "булган"
"tsetserleg" = "цэцэрлэг"
"sukhbaatar" = "сүхбаатар"
"ondorkhaan" = "өндөрхаан"
"sainshand" = "сайншанд"
"mandalgovi" = "мандалговь"
"altai" = "алтай"
