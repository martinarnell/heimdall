"kota kinabalu" = "kota kinabalu"
"kk" = "kota kinabalu"
"kuching" = "kuching"
"ipoh" = "ipoh"
"shah alam" = "shah alam"
"petaling jaya" = "petaling jaya"
"pj" = "petaling jaya"
"subang jaya" = "subang jaya"

