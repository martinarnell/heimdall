# Malay/Indonesian place name normalizer
# Used for Malaysia (MY), Indonesia (ID), Brunei (BN), and Singapore (SG).
# Malay and Indonesian are closely related languages using Latin script with
# minimal diacritics. Street type abbreviations are standardized across the region.
# No phonetic encoding — Latin script with simple orthography needs no phonetic layer.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (Malay/Indonesian)
"jalan" = "jl"
"jl." = "jl"
"lorong" = "lor"
"lor." = "lor"
"kampung" = "kg"
"kg." = "kg"
"taman" = "tmn"
"tmn." = "tmn"
"persiaran" = "psrn"
"lebuh" = "lbh"
"lengkok" = "lgk"
"simpang" = "spg"
"gang" = "gg"

# English street types (common in Singapore/Malaysia)
"street" = "st"
"avenue" = "ave"
"road" = "rd"
"drive" = "dr"
"boulevard" = "blvd"
"highway" = "hwy"
"lane" = "ln"
"place" = "pl"
"st." = "st"
"ave." = "ave"
"rd." = "rd"
"dr." = "dr"
"blvd." = "blvd"

# Directional abbreviations
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"utara" = "u"
"selatan" = "s"
"timur" = "t"
"barat" = "b"

# Administrative
"kota" = "kota"
"kabupaten" = "kab"
"kecamatan" = "kec"
"kelurahan" = "kel"
"provinsi" = "prov"
"negeri" = "negeri"

[stopwords]
words = [
    "malaysia",
    "my",
    "indonesia",
    "id",
    "brunei",
    "bn",
    "singapore",
    "sg",
    "brunei darussalam",
    "republic of indonesia",
    "republik indonesia",
    "republic of singapore",
]

