# Burmese place name normalizer
# Used for Myanmar (MM). Burmese script has no standard Latin transliteration —
# romanization varies widely. Known variants map common romanized names to Burmese.
# No phonetic encoding — Burmese tonal system doesn't map to European phonetic schemes.

[phonetic]
engine = "none"

[abbreviations]
# Burmese administrative suffixes
"မြို့" = "မြို့"       # myo — town/city
"ရပ်ကွက်" = "ရပ်ကွက်"   # yatkwet — ward
"လမ်း" = "လမ်း"         # lan — road/street

# Romanized road types
"street" = "st"
"road" = "rd"
"lane" = "ln"
"st." = "st"
"rd." = "rd"

[stopwords]
words = [
    "myanmar",
    "mm",
    "burma",
    "မြန်မာ",
    "ပြည်ထောင်စုသမ္မတမြန်မာနိုင်ငံတော်",
    "republic of the union of myanmar",
]

[known_variants]
# Major cities — romanized → Burmese script
"yangon" = "ရန်ကုန်"
"rangoon" = "ရန်ကုန်"
"mandalay" = "မန္တလေး"
"naypyidaw" = "နေပြည်တော်"
"nay pyi taw" = "နေပြည်တော်"
"bagan" = "ပုဂံ"
"pagan" = "ပုဂံ"
"mawlamyine" = "မော်လမြိုင်"
"moulmein" = "မော်လမြိုင်"
"pathein" = "ပုသိမ်"
"bassein" = "ပုသိမ်"
"taunggyi" = "တောင်ကြီး"
"monywa" = "မုံရွာ"
"meiktila" = "မိတ္ထီလာ"
"myitkyina" = "မြစ်ကြီးနား"
"lashio" = "လားရှိုး"
"sittwe" = "စစ်တွေ"
"akyab" = "စစ်တွေ"
"magway" = "မကွေး"
"dawei" = "ထားဝယ်"
"tavoy" = "ထားဝယ်"
"myeik" = "မြိတ်"
"mergui" = "မြိတ်"
"hpa-an" = "ဘားအံ"
"inle" = "အင်းလေး"
"inle lake" = "အင်းလေး"

[diacritics]
# Burmese script has no Latin diacritics. Handle occasional romanization artifacts.
"é" = "e"
"è" = "e"
"ā" = "a"
"ī" = "i"
"ū" = "u"
"ō" = "o"
