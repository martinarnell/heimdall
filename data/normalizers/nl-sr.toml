# Dutch place name normalizer for Suriname (SR)
# Photon-only country. Based on Dutch normalizer with Suriname-specific city variants.
# No phonetic encoding — Dutch spelling is regular enough for exact + Levenshtein.

[phonetic]
engine = "none"

[abbreviations]
# Dutch street type suffixes
"str" = "straat"
"str." = "straat"
"ln" = "laan"
"ln." = "laan"
"wg" = "weg"
"wg." = "weg"
"pl" = "plein"
"pl." = "plein"
"blvd" = "boulevard"
"blvd." = "boulevard"
"kd" = "kade"
"kd." = "kade"

# Directional
"n." = "noord"
"z." = "zuid"
"o." = "oost"
"w." = "west"

[stopwords]
words = [
    "suriname",
    "sr",
    "republiek suriname",
    "republic of suriname",
    "district",
    "ressort",
]

[known_variants]
# Capital and major cities
"paramaribo" = "paramaribo"
"pbm" = "paramaribo"
"parbo" = "paramaribo"
"lelydorp" = "lelydorp"
"nieuw nickerie" = "nieuw nickerie"
"nickerie" = "nieuw nickerie"
"moengo" = "moengo"
"nieuw amsterdam" = "nieuw amsterdam"
"albina" = "albina"
"brokopondo" = "brokopondo"
"groningen" = "groningen"
"wageningen" = "wageningen"
"totness" = "totness"
"onverwacht" = "onverwacht"
"marienburg" = "marienburg"

[diacritics]
"ë" = "e"
"ï" = "i"
"é" = "e"
"è" = "e"
"ü" = "u"
"ö" = "o"
"ä" = "a"
