# Polish place name normalizer
# Covers Polish diacritics (Д…вҶ’a, ДҮвҶ’c, ДҷвҶ’e, ЕӮвҶ’l, etc.), street abbreviations,
# English city name variants, and admin stopwords.

[phonetic]
engine = "none"  # No phonetic encoding for Polish (diacritic stripping is sufficient)

[abbreviations]
# Street type abbreviations
"ul." = "ulica"
"ul" = "ulica"
"al." = "aleja"
"al" = "aleja"
"pl." = "plac"
"pl" = "plac"
"skw." = "skwer"
"skw" = "skwer"
"os." = "osiedle"
"os" = "osiedle"
"rondo" = "rondo"

# Administrative
"Еӣw." = "ЕӣwiДҷty"
"Еӣw" = "ЕӣwiДҷty"

[stopwords]
words = [
    "polska",
    "poland",
    "pl",
    "rzeczpospolita",
    "wojewГіdztwo",
    "powiat",
    "gmina",
]

[diacritics]
# Polish diacritics вҶ’ ASCII equivalents
"Д…" = "a"
"ДҮ" = "c"
"Дҷ" = "e"
"ЕӮ" = "l"
"Е„" = "n"
"Гі" = "o"
"Еӣ" = "s"
"Еә" = "z"
"Еј" = "z"

[known_variants]
# English names for Polish cities
"warsaw" = "warszawa"
"cracow" = "krakГіw"
"krakow" = "krakГіw"
"gdansk" = "gdaЕ„sk"
"danzig" = "gdaЕ„sk"
"wroclaw" = "wrocЕӮaw"
"breslau" = "wrocЕӮaw"
"lodz" = "ЕӮГіdЕә"
"poznan" = "poznaЕ„"
"posen" = "poznaЕ„"
"szczecin" = "szczecin"
"stettin" = "szczecin"
"katowice" = "katowice"
"kattowitz" = "katowice"
"bydgoszcz" = "bydgoszcz"
"bromberg" = "bydgoszcz"
"lublin" = "lublin"
"bialystok" = "biaЕӮystok"
"czestochowa" = "czДҷstochowa"
"torun" = "toruЕ„"
"thorn" = "toruЕ„"
"rzeszow" = "rzeszГіw"
"olsztyn" = "olsztyn"
"allenstein" = "olsztyn"
"gorzow wielkopolski" = "gorzГіw wielkopolski"
"zielona gora" = "zielona gГіra"
"opole" = "opole"
"oppeln" = "opole"
