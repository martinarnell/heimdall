# Sinhala place name normalizer
# Sri Lanka (LK).
# Sinhala script with Latin/English transliterations in Photon data.
# Sri Lanka also uses Tamil — Tamil speakers search with English transliterations.
# No phonetic encoding.

[phonetic]
engine = "none"

[abbreviations]
# English street types common in Sri Lankan addresses
"road" = "rd"
"street" = "st"
"lane" = "ln"
"avenue" = "ave"
"mawatha" = "mw"
"vidiya" = "vid"
"place" = "pl"
"drive" = "dr"
"crescent" = "cres"

# Sinhala street types
"මාවත" = "මා"
"වීදිය" = "වී"
"පාර" = "පා"

[stopwords]
words = [
    "ශ්‍රී ලංකාව",
    "sri lanka",
    "lk",
    "ceylon",
    "democratic socialist republic of sri lanka",
]

