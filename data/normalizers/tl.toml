# Filipino/Tagalog place name normalizer
# Used for Philippines (PH) and Timor-Leste (TL). Filipino uses Latin script
# with the addition of ñ from Spanish influence. Place names often have
# Spanish-era origins. Timor-Leste uses Portuguese-influenced place names.
# No phonetic encoding — Latin script with simple orthography.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations (Filipino/English)
"street" = "st"
"avenue" = "ave"
"road" = "rd"
"drive" = "dr"
"boulevard" = "blvd"
"highway" = "hwy"
"lane" = "ln"
"court" = "ct"
"st." = "st"
"ave." = "ave"
"rd." = "rd"
"dr." = "dr"
"blvd." = "blvd"
"hwy." = "hwy"

# Filipino/Spanish road types
"kalye" = "st"
"daang" = "rd"
"daan" = "rd"
"lansangan" = "st"

# Directional abbreviations
"north" = "n"
"south" = "s"
"east" = "e"
"west" = "w"
"n." = "n"
"s." = "s"
"e." = "e"
"w." = "w"

# Administrative
"barangay" = "brgy"
"brgy." = "brgy"
"city" = "city"
"municipality" = "mun"
"province" = "prov"

[stopwords]
words = [
    "philippines",
    "ph",
    "pilipinas",
    "republika ng pilipinas",
    "republic of the philippines",
    "timor-leste",
    "tl",
    "east timor",
    "timor leste",
    "republica democratica de timor-leste",
]

