# Urdu place name normalizer
# Pakistan (PK).
# Urdu script is Arabic/Persian-based with additional characters.
# Photon data has both Urdu-script and English/Latin names.
# No phonetic encoding.

[phonetic]
engine = "none"

[abbreviations]
# Urdu street types
"سڑک" = "سڑک"
"گلی" = "گلی"
"شاہراہ" = "ش"
"روڈ" = "روڈ"
"بازار" = "بزر"

# English street types common in Pakistani addresses
"road" = "rd"
"street" = "st"
"lane" = "ln"
"block" = "blk"
"sector" = "sec"
"phase" = "ph"
"scheme" = "sch"
"colony" = "col"
"town" = "twn"
"garden" = "gdn"
"society" = "soc"
"shahrah" = "sh"
"bazaar" = "bzr"
"bazar" = "bzr"

[stopwords]
words = [
    "پاکستان",
    "pakistan",
    "pk",
    "islamic republic of pakistan",
    "اسلامی جمہوریہ پاکستان",
]

[known_variants]
# Major Pakistani cities — English → Urdu
"karachi" = "کراچی"
"lahore" = "لاہور"
"islamabad" = "اسلام آباد"
"rawalpindi" = "راولپنڈی"
"faisalabad" = "فیصل آباد"
"lyallpur" = "فیصل آباد"
"multan" = "ملتان"
"peshawar" = "پشاور"
"quetta" = "کوئٹہ"
"sialkot" = "سیالکوٹ"
"gujranwala" = "گوجرانوالہ"
"hyderabad" = "حیدر آباد"
"bahawalpur" = "بہاولپور"
"sargodha" = "سرگودھا"
"sukkur" = "سکھر"
"larkana" = "لاڑکانہ"
"abbottabad" = "ایبٹ آباد"
"mardan" = "مردان"
"mingora" = "مینگورہ"
"dera ghazi khan" = "ڈیرہ غازی خان"
"dera ismail khan" = "ڈیرہ اسماعیل خان"
"muzaffarabad" = "مظفرآباد"
"gilgit" = "گلگت"
"skardu" = "سکردو"
"chitral" = "چترال"
"swat" = "سوات"

