# Vietnamese place name normalizer
# Vietnamese uses Latin script with extensive diacritics (tone marks + modified vowels).
# All diacritics are stripped to plain Latin for fuzzy matching — critical because
# users searching from non-Vietnamese keyboards rarely type the marks.
# No phonetic encoding — diacritic stripping provides sufficient normalization.

[phonetic]
engine = "none"

[abbreviations]
# Street type abbreviations
"đường" = "d"
"phố" = "pho"
"ngõ" = "ngo"
"ngách" = "ngach"
"hẻm" = "hem"

# Administrative suffixes
"thành phố" = "tp"
"tỉnh" = "tinh"
"quận" = "q"
"huyện" = "h"
"phường" = "p"
"xã" = "xa"
"thị trấn" = "tt"

[stopwords]
words = [
    "vietnam",
    "viet nam",
    "vn",
    "việt nam",
    "cộng hòa xã hội chủ nghĩa việt nam",
    "socialist republic of vietnam",
]

[known_variants]
# Major cities — diacritic-free romanized → canonical Vietnamese
"ho chi minh city" = "hồ chí minh"
"ho chi minh" = "hồ chí minh"
"saigon" = "hồ chí minh"
"sai gon" = "hồ chí minh"
"hanoi" = "hà nội"
