[diacritics]
# Pinyin tone marks → plain vowels (all four tones + neutral)
# ā á ǎ à → a
"ā" = "a"
"á" = "a"
"ǎ" = "a"
"à" = "a"
# ē é ě è → e
"ē" = "e"
"é" = "e"
"ě" = "e"
"è" = "e"
# ī í ǐ ì → i
"ī" = "i"
"í" = "i"
"ǐ" = "i"
"ì" = "i"
# ō ó ǒ ò → o
"ō" = "o"
"ó" = "o"
"ǒ" = "o"
"ò" = "o"
# ū ú ǔ ù → u
"ū" = "u"
"ú" = "u"
"ǔ" = "u"
"ù" = "u"
# ǖ ǘ ǚ ǜ ü → v (standard pinyin convention: ü romanized as v)
"ǖ" = "v"
"ǘ" = "v"
"ǚ" = "v"
"ǜ" = "v"
"ü" = "v"
