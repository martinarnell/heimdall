# Chinese place name normalizer
# Used for China (CN) and Taiwan (TW). Handles pinyin diacritics (tone marks),
# full-width → half-width conversion, and romanized ↔ Chinese character city variants.
#
# No phonetic encoding — CJK character matching and pinyin normalization suffice.
# Chinese has no word boundaries (no spaces), so [abbreviations] cannot work for
# CJK street/admin suffixes (路/街/市/省). Photon data provides romanized forms
# in name:en / name:la fields, which are matched via pinyin diacritic normalization.

[phonetic]
engine = "none"
# CRITICAL for Chinese text: addresses often use full-width digits/letters
# (０１２３, Ａ-Ｚ) — this converts them to standard ASCII (0123, A-Z).
fullwidth_to_halfwidth = true

[abbreviations]
# Chinese street/admin suffixes are NOT here — they cannot be matched at word
# boundaries since Chinese text has no spaces. Instead we rely on:
# 1. Exact CJK character matching in the FST
# 2. Photon's romanized name:en / name:la fields for Latin-script queries
# 3. Known variants below for major city names

# Romanized abbreviations that appear in English-language queries
"rd" = "road"
"st" = "street"
"ave" = "avenue"
"blvd" = "boulevard"

[stopwords]
words = [
    "china",
    "cn",
    "中国",
    "中华人民共和国",
    "peoples republic of china",
    "prc",
    "taiwan",
    "tw",
    "台湾",
    "臺灣",
    "中华民国",
    "republic of china",
]

