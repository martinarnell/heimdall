name = "United States"
index_name = "index-us"
normalizer = "data/normalizers/en-us.toml"
ram_gb = 16

# US OSM PBF from Geofabrik (~10GB)
[country.us.osm]
url = "https://download.geofabrik.de/north-america/us-latest.osm.pbf"
state_url = "https://download.geofabrik.de/north-america/us-updates/state.txt"

# Photon extract for enrichment
[country.us.photon]
url = "https://download1.graphhopper.com/public/extracts/by-country-code/us/photon-db-us-250720.tar.bz2"
md5_url = "https://download1.graphhopper.com/public/extracts/by-country-code/us/photon-db-us-250720.tar.bz2.md5"

# TIGER/Line 2025 for admin boundaries + ZIP codes (downloaded by tiger-import)
# OpenAddresses for address data (downloaded by oa-import)
[country.us.national]
type = "tiger_oa"
tiger_base_url = "https://www2.census.gov/geo/tiger/TIGER2025"
oa_base_url = "https://data.openaddresses.io/openaddr-collected-us_northeast.zip"

