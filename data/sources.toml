# Heimdall rebuild sources configuration
# Used by: heimdall-build rebuild --config data/sources.toml

[defaults]
download_dir = "data/downloads"
index_dir = "data"

# ── Denmark ────────────────────────────────────────────────────────────────

[country.dk]
name = "Denmark"
index_name = "index-dk"
normalizer = "data/normalizers/da.toml"
ram_gb = 2

[country.dk.osm]
url = "https://download.geofabrik.de/europe/denmark-latest.osm.pbf"
state_url = "https://download.geofabrik.de/europe/denmark-updates/state.txt"
# Greenland and Faroe Islands are autonomous countries within the Kingdom
# of Denmark — Geofabrik publishes them separately. Merging them into the
# DK extract resolves "Nuuk", "Tórshavn", etc. without spinning up
# dedicated indices. Requires `osmium` on the build host.
extra_urls = [
    "https://download.geofabrik.de/north-america/greenland-latest.osm.pbf",
    "https://download.geofabrik.de/europe/faroe-islands-latest.osm.pbf",
]

[country.dk.photon]
url = "https://download1.graphhopper.com/public/extracts/by-country-code/dk/photon-db-dk-250720.tar.bz2"
md5_url = "https://download1.graphhopper.com/public/extracts/by-country-code/dk/photon-db-dk-250720.tar.bz2.md5"

[country.dk.national]
type = "dawa"
url = "https://api.dataforsyningen.dk/adgangsadresser?format=csv&srid=4326"
sequence_url = "https://api.dataforsyningen.dk/replikering/senestesekvensnummer"

# Authoritative Danish place names registry (~140K records). Adds
# bydele (suburbs/districts), castles, museums, churches, bridges,
# stadiums, lakes, islands etc. — fixes "Storebæltsbroen", "Klampenborg",
# "H.C. Andersens Hus", "Charlottenlund Slot" etc. that OSM tags
# inconsistently. Same Dataforsyningen infra as DAWA — no auth needed.
[country.dk.places_source]
type = "dagi"
url = "https://api.dataforsyningen.dk/steder?format=json"

